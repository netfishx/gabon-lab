# ================== MyBatis-Plus Configuration ==================
# MyBatis Plus configuration for user management system
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.journey.admin.model.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.cache-enabled=false
mybatis-plus.configuration.call-setters-on-nulls=true
mybatis-plus.configuration.jdbc-type-for-null=null

# Global Configuration
mybatis-plus.global-config.db-config.id-type=auto
# Note: We handle logical deletion manually (no @TableLogic annotation)
# - Query: Add .isNull(Entity::getDeletedFlag) to WHERE clause
# - Delete: Set entity.setDeletedFlag(Instant.now()) and call updateById()

