# ================== Server Configuration ==================
server.port=8082
server.servlet.context-path=/service

# ================== JSON Configuration ==================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8
spring.jackson.default-property-inclusion=non_null

# ================== JWT Configuration ==================
# IMPORTANT: Change this secret key in production!
jwt.secret=gabon-service-prod-jwt-secret-CHANGE-THIS-IN-PRODUCTION-minimum-256-bits
jwt.expiration=86400
jwt.token-prefix=Bearer 
jwt.subject=gabon-service-prod

# ================== MyBatis-Plus Configuration ==================
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.gabon.service.model.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.cache-enabled=false
mybatis-plus.configuration.call-setters-on-nulls=true
mybatis-plus.configuration.jdbc-type-for-null=null

# Global Configuration
mybatis-plus.global-config.db-config.id-type=auto
# Note: We handle logical deletion manually (no @TableLogic annotation)
# - Query: Add .isNull(Entity::getDeletedFlag) to WHERE clause
# - Delete: Set entity.setDeletedFlag(Instant.now()) and call updateById()
# SQL logging configuration (disabled for production)
decorator.datasource.p6spy.enabled=false
decorator.datasource.p6spy.logging=slf4j
logging.level.p6spy=INFO
logging.level.com.p6spy=INFO
logging.level.com.gabon.service=INFO
