spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Local Docker MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/gabon_admin?characterEncoding=UTF-8&useUnicode=true&useSSL=false&tinyInt1isBit=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=CHANGE_ME_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.druid.initial-size=5
spring.datasource.druid.min-idle=5
spring.datasource.druid.max-active=20
spring.datasource.druid.max-wait=60000
spring.datasource.druid.stat-view-servlet.enabled=false

# Local Docker Redis
spring.data.redis.client-type=jedis
spring.data.redis.host=localhost
spring.data.redis.password=benchpass
spring.data.redis.port=6379
spring.data.redis.database=1
spring.data.redis.jedis.pool.max-active=100
spring.data.redis.jedis.pool.max-idle=100

# Dummy AWS (won't upload but won't crash)
aws.s3.access-key=dummy
aws.s3.secret-key=dummy
aws.s3.region=us-east-1
aws.s3.bucket-name=dummy

aws.mediaconvert.role-arn=dummy
aws.mediaconvert.region=us-east-1
aws.mediaconvert.job-template-name=dummy
aws.mediaconvert.source-prefix=dummy/
aws.mediaconvert.preview-prefix=dummy/

# MyBatis-Plus
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.gabon.service.model.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true

mybatis-plus.global-config.db-config.id-type=auto

# Server
server.port=8082
server.servlet.context-path=/service

# JWT
jwt.secret=gabon-service-customer-jwt-secret-key-change-in-production-minimum-256-bits
jwt.expiration=86400
jwt.token-prefix=Bearer
jwt.subject=gabon-service

# Disable SQL logging
decorator.datasource.p6spy.enabled=false
